name: CTF Flag Checker

on:
  issues:
    types: [opened]

jobs:
  check_flag:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.title, 't474{')

    permissions:
      issues: write
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Verify flag and update Hall of Luminous
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const body = issue.body || '';
            const title = issue.title || '';
            const content = title + ' ' + body;
            const user = issue.user.login;

            const FLAG = 't474{g4Du_0f_the_c0d3}';

            if (!content.includes(FLAG)) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `\`\`\`
SYSTEM_STATUS: ACCESS_DENIED
FLAG: INVALID
\`\`\`

Eso no es lo que buscas.
Vuelve a la imagen. Mirá más profundo.`
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                labels: ['flag-invalid']
              });
              return;
            }

            // Flag correcta
            const { data: fileData } = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: 'HALL_OF_LUMINOUS.md'
            });

            const content_decoded = Buffer.from(fileData.content, 'base64').toString();

            // Verificar si ya está en el Hall
            if (content_decoded.includes(`@${user}`)) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `\`\`\`
SYSTEM_STATUS: DUPLICATE_ENTRY
\`\`\`

Ya estás en el Hall, @${user}.
No se puede entrar dos veces al mismo lugar.`
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed'
              });
              return;
            }

            // Agregar al Hall
            const now = new Date().toISOString().split('T')[0];
            const entry = `| ${user.length} | @${user} | ${now} |`;
            const updated = content_decoded.replace(
              '| — | *esperando al primero* | — |',
              entry
            ).replace(
              /(\| \d+ \| @.+ \| .+ \|)\n(\|---)/,
              (match, last, sep) => {
                const num = parseInt(last.split('|')[1].trim()) + 1;
                return `${last}\n| ${num} | @${user} | ${now} |\n${sep}`;
              }
            );

            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: 'HALL_OF_LUMINOUS.md',
              message: `[CTF] ${user} joined the Hall of Luminous`,
              content: Buffer.from(updated).toString('base64'),
              sha: fileData.sha
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: `\`\`\`
SYSTEM_STATUS: ACCESS_GRANTED
CLEARANCE_LEVEL: LUMINOUS
IDENTITY: ${user}
\`\`\`

Basta de mirar mi código. El hecho de que estés leyendo esto significa que tienes los ojos abiertos en un mundo de ciegos digitales. Enhorabuena, descifraste el secreto. Ahora guarda la flag, cierra la terminal remota y ve a encriptar tus propias llaves locales antes de que la matriz te borre del mapa.

Tu nombre ya está en el [Hall of Luminous](../blob/main/HALL_OF_LUMINOUS.md).`
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              state: 'closed',
              labels: ['luminous']
            });
