name: CTF Flag Checker

on:
  issues:
    types: [opened]

jobs:
  check_flag:
    runs-on: ubuntu-latest
    if: "contains(github.event.issue.title, 't474{')"

    permissions:
      issues: write
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Verify flag and update Hall of Luminous
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const body = issue.body || '';
            const title = issue.title || '';
            const content = title + ' ' + body;
            const user = issue.user.login;
            const FLAG = 't474{g4Du_0f_the_c0d3}';

            if (!content.includes(FLAG)) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: '```\nSYSTEM_STATUS: ACCESS_DENIED\nFLAG: INVALID\n```\n\nEso no es lo que buscas.\nVuelve a la imagen. Mira más profundo.'
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                labels: ['flag-invalid']
              });
              return;
            }

            const { data: fileData } = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: 'HALL_OF_LUMINOUS.md'
            });

            const content_decoded = Buffer.from(fileData.content, 'base64').toString();

            if (content_decoded.includes('@' + user)) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: '```\nSYSTEM_STATUS: DUPLICATE_ENTRY\n```\n\nYa estás en el Hall, @' + user + '.\nNo se puede entrar dos veces al mismo lugar.'
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed'
              });
              return;
            }

            const now = new Date().toISOString().split('T')[0];
            const entry = '| ' + (content_decoded.match(/\|\s*\d+\s*\|/g) || []).length + ' | @' + user + ' | ' + now + ' |';
            const updated = content_decoded.replace(
              '| — | *esperando al primero* | — |',
              entry
            );

            const finalContent = content_decoded.includes('esperando al primero')
              ? updated
              : content_decoded.replace(
                  /(\| \d+ \| @\S+ \| \S+ \|)\n(\|---)/,
                  '$1\n' + entry + '\n$2'
                );

            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: 'HALL_OF_LUMINOUS.md',
              message: '[CTF] ' + user + ' joined the Hall of Luminous',
              content: Buffer.from(finalContent).toString('base64'),
              sha: fileData.sha
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: '```\nSYSTEM_STATUS: ACCESS_GRANTED\nCLEARANCE_LEVEL: LUMINOUS\nIDENTITY: ' + user + '\n```\n\nBasta de mirar mi código. El hecho de que estés leyendo esto significa que tienes los ojos abiertos en un mundo de ciegos digitales. Enhorabuena, descifraste el secreto. Ahora guarda la flag, cierra la terminal remota y ve a encriptar tus propias llaves locales antes de que la matriz te borre del mapa.\n\nTu nombre ya está en el [Hall of Luminous](../blob/main/HALL_OF_LUMINOUS.md).'
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              state: 'closed',
              labels: ['luminous']
            });
